<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lease Charges Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <!-- IMPORTANT: defer ensures DOM loads before script runs -->
  <script src="script.js" defer></script>
</head>

<body>

  <div class="container">

    <h1>Lease Charges Calculator</h1>

    <!-- PROPERTY DROPDOWN -->
    <label for="property">Property</label>
    <select id="property">
      <option value="">Loading properties...</option>
    </select>

    <!-- MONTHLY RENT -->
    <label for="rent">Monthly Rent</label>
    <input type="number" id="rent" placeholder="Enter monthly rent">

    <!-- MOVE-IN DATE -->
    <label for="moveIn">Move-in Date</label>
    <input type="date" id="moveIn">

    <!-- PETS -->
    <label for="pets">Number of Pets</label>
    <input type="number" id="pets" value="0" min="0">

    <!-- CALCULATE BUTTON -->
    <button onclick="calculate()">Calculate</button>

    <!-- RESULT OUTPUT -->
    <div id="result"></div>

  </div>

</body>
</html>
